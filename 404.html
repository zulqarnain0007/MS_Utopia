<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | মহাসাফল্য ইউটোপিয়া</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page { text-align: center; padding: 150px 20px; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .error-code { font-size: 8rem; font-weight: 800; color: var(--primary-green); margin-bottom: 20px; }
        .error-message { font-size: 1.5rem; color: var(--gray-text); margin-bottom: 30px; }
        .error-emoji { font-size: 5rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-emoji">😕</div>
        <div class="error-code">404</div>
        <h2 class="error-message">পেজটি পাওয়া যায়নি | Page Not Found</h2>
        <p>আপনি যে পেজটি খুঁজছেন তা বিদ্যমান নেই।</p>
        <a href="index.html" class="btn btn-primary" style="margin-top: 30px;">হোমপেজে ফিরে যান</a>
    </div>
</body>
</html>
